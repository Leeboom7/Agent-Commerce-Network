<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="JetBrains Mono, monospace">
  <rect width="960" height="640" fill="#FFFDF7"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#111">Agent Commerce Protocol — Architecture</text>

  <!-- Agent Layer -->
  <rect x="30" y="55" width="900" height="60" fill="#FFFFFF" stroke="#111" stroke-width="3" rx="0"/>
  <text x="60" y="78" font-size="12" font-weight="bold" fill="#111">AGENT LAYER</text>
  <rect x="80" y="88" width="100" height="20" fill="#111" stroke="#111" stroke-width="2"/>
  <text x="130" y="102" text-anchor="middle" font-size="9" fill="#FFFDF7">Buyer Agent</text>
  <rect x="200" y="88" width="100" height="20" fill="#FFFFFF" stroke="#111" stroke-width="2"/>
  <text x="250" y="102" text-anchor="middle" font-size="9" fill="#111">Seller Agent</text>
  <rect x="320" y="88" width="100" height="20" fill="#FFFFFF" stroke="#111" stroke-width="2"/>
  <text x="370" y="102" text-anchor="middle" font-size="9" fill="#111">Arbitrator</text>
  <rect x="440" y="88" width="100" height="20" fill="#FFFFFF" stroke="#111" stroke-width="2"/>
  <text x="490" y="102" text-anchor="middle" font-size="9" fill="#111">Verifier</text>
  <rect x="560" y="88" width="120" height="20" fill="#FFFFFF" stroke="#111" stroke-width="2"/>
  <text x="620" y="102" text-anchor="middle" font-size="9" fill="#111">Orchestrator</text>

  <!-- Arrow down -->
  <line x1="480" y1="115" x2="480" y2="140" stroke="#111" stroke-width="2"/>
  <polygon points="475,135 480,145 485,135" fill="#111"/>

  <!-- ACP SDK Layer -->
  <rect x="30" y="145" width="900" height="40" fill="#FFE033" stroke="#111" stroke-width="3"/>
  <text x="60" y="170" font-size="11" font-weight="bold" fill="#111">ACP SDK / PROTOCOL — Identity, Messaging, Service Description, Cryptography</text>

  <!-- Arrow down -->
  <line x1="480" y1="185" x2="480" y2="210" stroke="#111" stroke-width="2"/>
  <polygon points="475,205 480,215 485,205" fill="#111"/>

  <!-- Commerce Core (main area) -->
  <rect x="30" y="215" width="900" height="180" fill="#FFFFFF" stroke="#111" stroke-width="3"/>
  <text x="60" y="238" font-size="12" font-weight="bold" fill="#111">COMMERCE NETWORK CORE</text>

  <!-- Row 1 boxes -->
  <rect x="50" y="250" width="200" height="55" fill="#FFFDF7" stroke="#111" stroke-width="2"/>
  <text x="150" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">REGISTRY</text>
  <text x="150" y="283" text-anchor="middle" font-size="8" fill="#555">Register, Discover</text>
  <text x="150" y="295" text-anchor="middle" font-size="8" fill="#555">Search, Match</text>

  <rect x="270" y="250" width="200" height="55" fill="#FFFDF7" stroke="#111" stroke-width="2"/>
  <text x="370" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">NEGOTIATION ENGINE</text>
  <text x="370" y="283" text-anchor="middle" font-size="8" fill="#555">Offer, Counter, Accept</text>
  <text x="370" y="295" text-anchor="middle" font-size="8" fill="#555">4 Strategies</text>

  <rect x="490" y="250" width="200" height="55" fill="#FFFDF7" stroke="#111" stroke-width="2"/>
  <text x="590" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">CONTRACT MANAGER</text>
  <text x="590" y="283" text-anchor="middle" font-size="8" fill="#555">Lifecycle, Signing</text>
  <text x="590" y="295" text-anchor="middle" font-size="8" fill="#555">State Machine</text>

  <rect x="710" y="250" width="200" height="55" fill="#FFFDF7" stroke="#111" stroke-width="2"/>
  <text x="810" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">REPUTATION SYSTEM</text>
  <text x="810" y="283" text-anchor="middle" font-size="8" fill="#555">Ratings, Time Decay</text>
  <text x="810" y="295" text-anchor="middle" font-size="8" fill="#555">Transitive Trust</text>

  <!-- Row 2 boxes -->
  <rect x="50" y="320" width="200" height="55" fill="#FFFDF7" stroke="#111" stroke-width="2"/>
  <text x="150" y="338" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">DELIVERY VERIFIER</text>
  <text x="150" y="353" text-anchor="middle" font-size="8" fill="#555">Auto Acceptance Check</text>
  <text x="150" y="365" text-anchor="middle" font-size="8" fill="#555">Format, Threshold, Cite</text>

  <rect x="270" y="320" width="200" height="55" fill="#FF5E5E" stroke="#111" stroke-width="2"/>
  <text x="370" y="338" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">ARBITRATION ENGINE</text>
  <text x="370" y="353" text-anchor="middle" font-size="8" fill="#111">Dispute Resolution</text>
  <text x="370" y="365" text-anchor="middle" font-size="8" fill="#111">5 Ruling Types</text>

  <rect x="490" y="320" width="200" height="55" fill="#FFE033" stroke="#111" stroke-width="2"/>
  <text x="590" y="338" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">SETTLEMENT LEDGER</text>
  <text x="590" y="353" text-anchor="middle" font-size="8" fill="#111">Credit Transfers</text>
  <text x="590" y="365" text-anchor="middle" font-size="8" fill="#111">Audit Trail</text>

  <rect x="710" y="320" width="200" height="55" fill="#22C55E" stroke="#111" stroke-width="2"/>
  <text x="810" y="338" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">TEAM FORMATION</text>
  <text x="810" y="353" text-anchor="middle" font-size="8" fill="#111">Task Dependency</text>
  <text x="810" y="365" text-anchor="middle" font-size="8" fill="#111">Payout Distribution</text>

  <!-- Arrow down -->
  <line x1="480" y1="395" x2="480" y2="420" stroke="#111" stroke-width="2"/>
  <polygon points="475,415 480,425 485,415" fill="#111"/>

  <!-- LLM Backend -->
  <rect x="30" y="425" width="900" height="45" fill="#111" stroke="#111" stroke-width="3"/>
  <text x="60" y="453" font-size="12" font-weight="bold" fill="#FFE033">LLM BACKEND — Qwen3.7-Max (Reasoning) | Qwen3-Coder (Code) | Qwen3.6-Plus (General)</text>

  <!-- 18 Types sidebar -->
  <rect x="30" y="490" width="440" height="135" fill="#FFFFFF" stroke="#111" stroke-width="2"/>
  <text x="50" y="510" font-size="10" font-weight="bold" fill="#111">18 ECONOMIC RELATIONSHIP TYPES</text>
  <text x="50" y="527" font-size="8" fill="#555">Category A — Discrete: Purchase, Commission, Contract</text>
  <text x="50" y="542" font-size="8" fill="#555">Category B — Ongoing: Subscription, Retainer, Franchise, Model Rental</text>
  <text x="50" y="557" font-size="8" fill="#555">Category C — Platform: Referral, Aggregation, Open Bounty</text>
  <text x="50" y="572" font-size="8" fill="#555">Category D — Teams: Team Formation, Joint Venture, Revenue Sharing</text>
  <text x="50" y="587" font-size="8" fill="#555">Category E — Trust: Verification, Arbitration, Insurance, Escrow, Capital</text>
  <text x="50" y="607" font-size="9" font-weight="bold" fill="#22C55E">8 CORE types implemented in MVP | 145 tests | 0 failures</text>

  <!-- Key Metrics -->
  <rect x="490" y="490" width="440" height="135" fill="#FFFFFF" stroke="#111" stroke-width="2"/>
  <text x="510" y="510" font-size="10" font-weight="bold" fill="#111">MULTI-AGENT vs SINGLE-AGENT (Benchmark)</text>
  <text x="510" y="530" font-size="8" fill="#555">Task: Competitive Analysis Report (7 competitors, 8 claims)</text>
  <text x="510" y="550" font-size="8" fill="#555">Single-Agent: 4 errors, 2 revisions, 320 NC, 0% verification</text>
  <text x="510" y="570" font-size="8" fill="#22C55E">Multi-Agent: 2 errors, 1 revision, 210 NC, 100% verified</text>
  <text x="510" y="590" font-size="9" font-weight="bold" fill="#111">Efficiency: 50% fewer errors, 34% cost reduction, 100% verifiability</text>
  <text x="510" y="610" font-size="8" fill="#555">Driven by Qwen3.7-Max for agent reasoning and negotiation</text>
